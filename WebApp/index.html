<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dashboard</title>
    <style>
        html { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: Arial, sans-serif; color: rgb(169, 106, 102); text-align: left; background: #d1c9c9; padding: 50px; }
        h1 { font-size: 50px; font-family: Arial; font-weight: bold; -webkit-text-stroke: 2px rgb(51, 39, 26); margin: 0px;}
        h2 { font-size: 40px; font-family: Verdana; font-weight: bold; -webkit-text-stroke: 2px rgb(51, 39, 26); }
        .horizontal-container { display: flex; align-items: center; }
        .reminder { display: flex; width: auto; padding: 5px; font-size: 20px; font-weight: bold; letter-spacing: 1px; background: rgb(169, 106, 102); border-radius: 12px; border: 2px solid black; }
        .datetime { font-size: 15px; font-weight: bold; margin: 0px 5px; border-radius: 5px; background: rgb(93, 62, 60); color: #d1c9c9; }
        #connectBtn { z-index: 2; position:fixed; left: 50%; transform: translate(-50%); bottom:30px; padding: 15px 10px; font-size: 20px; font-weight: bold; letter-spacing: 1px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); background: rgb(169, 106, 102); color: white; border: 4px solid rgb(128, 81, 78); border-radius: 25px; cursor: pointer; }
        #data-box { margin-top: 30px; text-align:center; font-size: 14px; font-weight: bold; color: #333; }
        #reminder-box { display: flex; flex-direction: column; gap: 5px; margin-top: 30px; padding: 5px; text-align:center; font-size: 14px; font-weight: bold; color: #333; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); border-radius: 15px; border: 3px  solid #333; }
        #remindercreateBtn { width: 100%; height: 50px; font-size: 20px; font-weight: bold; letter-spacing: 1px; background: transparent; color: #333; border: 2px dotted black; border-radius: 12px; cursor: pointer; }
        #remindername { display: flex; width: 100%; min-height: 1px; white-space: pre-wrap; padding: 5px; box-sizing: border-box; position: relative; color: #d1c9c9; font-size: 20px; font-weight: bold; letter-spacing: 1px; border-radius: 5px; background: rgb(128, 81, 78); }
        #datetime { display: flex; flex-direction: column; gap: 5px; width: auto; }
        #bpmvalue { font-size: 200px; }
        #status { color: #666; font-style: italic; margin: 0px; letter-spacing: 1px; font-weight: bold; }
        #emergencypopup { visibility: hidden; text-align: center; z-index: 0; width:100%; position: fixed; left: 50%; bottom: 50%; transform: translate(-50%); background: rgba(19, 16, 14, 0.61); border: 2px solid black; border-radius: 5px; }
        #emergencysubtext { font-family: Verdana; font-size: 20px; font-weight: bolder; -webkit-text-stroke: 1px rgb(51, 39, 26); }
    </style>
</head>
<body>

    <h1>OneBand</h1>
    <button id="connectBtn">Connect Wristband</button>
    <div class="horizontal-container">
        <p id="status">Disconnected</p>
    </div>

    <div id="data-box"><span id="bpmvalue">--</span>BPM</div>

    <div id="reminder-box">
        <button id="remindercreateBtn">+ Create Reminder</button>
    </div>

    <div id="emergencypopup">
        <h2>FALL DETECTED!</h2>
        <p id="emergencysubtext">Emergency Contacts have been notified.</p>
    </div>

    <script>
        const SERVICE_UUID = "03e0be01-38fe-41c8-a7e5-c294732282b7";
        const CHARACTERISTIC_UUID = "d5b00152-835a-4bf0-91c6-d9e15ebb270c";

        const connectBtn = document.getElementById('connectBtn');
        const reminderbox = document.getElementById('reminder-box');
        const remindercreateBtn = document.getElementById('remindercreateBtn');
        const statusText = document.getElementById('status');
        const bpmDisplay = document.getElementById('bpmvalue');
        const emergencyPopup = document.getElementById('emergencypopup')

        let characteristic = null;
        let activeReminders = [];
        let remindercount = 0;

        async function pingBuzzer(mode) {
            try {
                if (characteristic) {
                    const data = new Uint8Array([mode]);
                    await characteristic.writeValue(data);
                    console.log("Sent buzz command to ESP32!");
                }
            } catch (error) {
                console.error("Failed to send buzz command:", error);
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Scanning...";

                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                statusText.innerText = `Connecting to ${device.name}...`;

                const server = await device.gatt.connect();

                const service = await server.getPrimaryService(SERVICE_UUID);

                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusText.innerText = "Connected";

                await characteristic.startNotifications();

                pingBuzzer(1);

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;

                    const fallen = value.getUint8(0) !== 0;
                    const heartRate = value.getUint8(1);

                    bpmDisplay.innerText = heartRate;
                    if (fallen) {
                        emergencyPopup.style.visibility = "visible";
                    } else {
                        emergencyPopup.style.visibility = "hidden";
                    }
                });

                device.addEventListener('gattserverdisconnected', () => {
                    statusText.innerText = "Disconnected";
                    bpmDisplay.innerText = "--";
                });
            } catch (error) {
                console.error(error);
                statusText.innerText = "Error " + error.message;
            }
        })

        const today = new Date().toISOString().split('T')[0];

        remindercreateBtn.addEventListener('click', async () => {
            const newReminder = document.createElement('div');
            newReminder.className = 'reminder';
            newReminder.id = remindercount;
            newReminder.innerHTML = `
                <div id="remindername" contenteditable="true"; placeholder="Reminder Name">Reminder Name</div>
                <div id="datetime">
                    <input type="date" class="datetime" id="date" name="date" min=${today} value=${today} style="width: auto;">
                    <input type="time" class="datetime" id="time" name="time" style="width: auto;">
                </div>
            `;
            activeReminders[remindercount++] = {
                element: newReminder,
                timestamp: null,
                triggered: false
            };
            newReminder.lastElementChild.children[0].addEventListener('change', (event) => {
                const dateStr = newReminder.lastElementChild.children[0].value;
                const timeStr = newReminder.lastElementChild.children[1].value;
                if (!dateStr || !timeStr) return;

                activeReminders[reminder.id].timestamp = new Date(`${dateStr}T${timeStr}`);
            })
            newReminder.lastElementChild.children[1].addEventListener('change', (event) => {
                const dateStr = newReminder.lastElementChild.children[0].value;
                const timeStr = newReminder.lastElementChild.children[1].value;
                if (!dateStr || !timeStr) return;

                activeReminders[newReminder.id].timestamp = new Date(`${dateStr}T${timeStr}`);
            })

            reminderbox.prepend(newReminder);
        })

        setInterval(() => {
            if (!characteristic) return;

            const now = Date.now();

            activeReminders.forEach((reminder) => {
                if (reminder.timestamp != null && now >= reminder.timestamp && !reminder.triggered) {
                    reminder.triggered = true;

                    console.log("Reminder time reached! Pinging ESP32...");
                    pingBuzzer(2);
                    
                    reminder.element.style.backgroundColor = "#de704b";
              
                    reminder.element.addEventListener('click', async () => {
                        reminder.element.remove();
                    })
                }
            })
        }, 1000);
    </script>
</body>
</html>
