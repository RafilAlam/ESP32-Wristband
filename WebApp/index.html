<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; color: rgb(121, 84, 67); text-align: left; background: #d1c9c9; padding: 50px; }
        h1 { font-size: 50px; font-family: Verdana; font-weight: bold; -webkit-text-stroke: 2px rgb(51, 39, 26); margin: 0px;}
        .horizontal-container { display: flex; align-items: center; gap: 5px; }
        #connectBtn { position:fixed; left: 50%; transform: translate(-50%); bottom:30px; padding: 15px 10px; font-size: 20px; font-weight: bold; letter-spacing: 1px; background: #007bff; color: white; border: 4px solid #7398c0; border-radius: 25px; cursor: pointer; }
        #data-box { margin-top: 30px; font-size: 24px; font-weight: bold; color: #333; }
        #status { color: #666; font-style: italic; margin: 0px; letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Home</h1>
    <button id="connectBtn">Connect Wristband</button>
    <div class="horizontal-container">
        <p id="status">Disconnected</p>
    </div>

    <div id="data-box">Sensor Value: <span id="value">--</span></div>

    <script>
        const SERVICE_UUID = "03e0be01-38fe-41c8-a7e5-c294732282b7";
        const CHARACTERISTIC_UUID = "d5b00152-835a-4bf0-91c6-d9e15ebb270c";

        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');
        const valueDisplay = document.getElementById('value');

        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Scanning...";

                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                statusText.innerText = `Connecting to ${device.name}...`;

                const server = await device.gatt.connect();

                const service = await server.getPrimaryService(SERVICE_UUID);

                const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusText.innerText = "Connected";

                await characteristic.startNotifications();

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;

                    const acceleration = value.getFloat32(0, true);
                    const heartRate = value.getUint8(4);
                    const spo2 = value.getUint8(5);

                    valueDisplay.innerText = `Acceleration: ${acceleration}\n BPM: ${heartRate} \n SpO2: ${spo2}`;
                });

                device.addEventListener('gattserverdisconnected', () => {
                    statusText.innerText = "Disconnected";
                    valueDisplay.innerText = "--";
                });
            } catch (error) {
                console.error(error);
                statusText.innerText = "Error " + error.message;
            }
        })
    </script>
</body>
</html>
